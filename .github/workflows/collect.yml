name: Collect bibliometric data

# Permite execução manual e disparo programado para coleta dos corpora.
# Os artefatos (data/raw) ficam disponíveis para download na execução.
on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Quais coletas executar (separadas por vírgula): scopus,openalex,semantic_scholar,crossref,scielo"
        required: false
        default: "openalex,crossref,semantic_scholar,scielo"
      openalex_max:
        description: "Máx. registros por corpus (OpenAlex)"
        required: false
        default: "5000"
      crossref_max:
        description: "Máx. registros por corpus (Crossref)"
        required: false
        default: "2000"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      ENAJU_PHASE: collection
      ENAJU_OPENALEX_MAX: ${{ inputs.openalex_max }}
      ENAJU_CROSSREF_MAX: ${{ inputs.crossref_max }}
      SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
      SCOPUS_INST_TOKEN: ${{ secrets.SCOPUS_INST_TOKEN }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
      OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
      SCIELO_EMAIL: ${{ secrets.SCIELO_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libuv1-dev cmake pkg-config

      - name: Install R packages (collection phase)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::here
            any::dotenv
            any::dplyr
            any::tibble
            any::purrr
            any::stringr
            any::readr
            any::jsonlite
            any::httr2
            any::rscopus
            any::openalexR
            any::rcrossref
            any::xml2
            any::rvest
            any::curl
            any::progress

      - name: Run setup
        run: Rscript scripts/00_setup.R

      - name: Run Scopus collection
        if: contains(inputs.sources, 'scopus')
        run: Rscript scripts/01_collect_scopus.R

      - name: Run OpenAlex collection
        if: contains(inputs.sources, 'openalex')
        run: Rscript scripts/02_collect_openalex.R

      - name: Run Semantic Scholar collection
        if: contains(inputs.sources, 'semantic_scholar')
        run: Rscript scripts/03_collect_semantic_scholar.R

      - name: Run Crossref collection
        if: contains(inputs.sources, 'crossref')
        run: Rscript scripts/04_collect_crossref.R

      - name: Run SciELO collection
        if: contains(inputs.sources, 'scielo')
        run: Rscript scripts/05_collect_scielo.R

      - name: Summarize
        if: always()
        run: |
          echo "## Resumo de coleta" >> "$GITHUB_STEP_SUMMARY"
          for f in data/raw/corpus_*/*.rds; do
            [ -f "$f" ] && echo "- $f ($(stat -c%s "$f") bytes)" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload raw data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enaju-raw-data
          path: |
            data/raw/
            logs/pipeline_log.md
          if-no-files-found: warn
          retention-days: 14
